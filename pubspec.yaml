name: sellore_ai
description: "SelloreAI — AI Business Operating System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_crashlytics: ^4.2.0
  firebase_performance: ^0.10.0+5

  # UI & Helpers
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

  # Payment
  razorpay_flutter: ^1.3.7

  # Social Sharing
  share_plus: ^10.0.0
  url_launcher: ^6.3.0

  # Audio / Voice
  audioplayers: ^6.1.0
  record: ^5.2.0
  path_provider: ^2.1.5

  # ML Kit for Image Analysis
  google_ml_kit: ^0.18.0

  # Charts for Analytics
  fl_chart: ^0.70.0

  # Keep all existing dependencies
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  file_picker: ^8.1.4
  video_player: ^2.9.2
  chewie: ^1.8.5
  flutter_tts: ^4.2.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_native_splash: ^2.4.2
  flutter_launcher_icons: ^0.14.1
  google_fonts: ^6.2.1
  intl_phone_field: ^3.2.0
  country_picker: ^2.0.26
  fluttertoast: ^8.2.8
  shared_preferences: ^2.3.2
  http: ^1.3.0
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    # - assets/icons/
    # - assets/sounds/
    # - assets/fonts/